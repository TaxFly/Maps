<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Outlets Orlando 🛍️</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e10;
  --surface: #17171a;
  --surface2: #1f1f23;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0ede8;
  --muted: #888580;
  --accent: #f5c842;
  --accent2: #e8834a;
  --green: #4ecb8d;
  --green-bg: rgba(78,203,141,0.1);
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 120px;
  overflow-x: hidden;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 12px;
}
.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 14px;
}
.header-title {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  line-height: 1.1;
}
.header-title span { color: var(--accent); }
.header-subtitle {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
  font-weight: 300;
}
.global-counter {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 999px;
  padding: 6px 14px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  white-space: nowrap;
}

/* TABS */
.tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 999px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: 0.3px;
}
.tab.active {
  background: var(--accent);
  color: #0e0e10;
  border-color: var(--accent);
}

/* PANELS */
.panel { display: none; padding: 0 16px; }
.panel.active { display: block; }

/* HOTEL BAR */
.hotel-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin: 16px 0 12px;
  text-decoration: none;
}
.hotel-icon {
  width: 32px;
  height: 32px;
  background: rgba(245,200,66,0.12);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}
.hotel-info { flex: 1; min-width: 0; }
.hotel-label { font-size: 10px; color: var(--accent); font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 2px; }
.hotel-addr { font-size: 12px; color: var(--muted); font-weight: 300; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hotel-arrow { color: var(--muted); font-size: 14px; }

/* DAY LABEL */
.day-label {
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

/* PROGRESS */
.progress-wrap { margin-bottom: 16px; }
.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.progress-stats { display: flex; gap: 16px; }
.stat { text-align: center; }
.stat-val { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
.stat-lbl { font-size: 10px; color: var(--muted); font-weight: 300; }
.stat-val.accent { color: var(--accent); }
.reset-btn {
  font-size: 11px;
  color: var(--muted);
  background: none;
  border: 1px solid var(--border2);
  border-radius: 999px;
  padding: 4px 12px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all .2s;
}
.reset-btn:active { opacity: 0.6; }
.progress-bar-bg {
  height: 3px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width .4s cubic-bezier(.4,0,.2,1);
}

/* STOP CARDS */
.stop-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.stop-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: transparent;
  transition: background .2s;
}
.stop-card.visited {
  background: var(--surface2);
  border-color: var(--border);
}
.stop-card.visited::before { background: var(--green); }
.stop-card:active { transform: scale(0.98); }

.stop-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  flex-shrink: 0;
  transition: all .2s;
}
.stop-card.visited .stop-num {
  background: var(--green-bg);
  border-color: var(--green);
  color: var(--green);
}

.stop-body { flex: 1; min-width: 0; }
.stop-name {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.3;
  transition: color .2s;
}
.stop-card.visited .stop-name {
  color: var(--muted);
  text-decoration: line-through;
}
.stop-desc {
  font-size: 12px;
  color: var(--muted);
  font-weight: 300;
  line-height: 1.5;
  margin-bottom: 8px;
}
.stop-card.visited .stop-desc { opacity: 0.5; }

.stop-footer { display: flex; align-items: center; justify-content: space-between; }
.badges { display: flex; gap: 5px; flex-wrap: wrap; }
.badge {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 999px;
  letter-spacing: 0.3px;
}
.badge-star { background: rgba(245,200,66,0.15); color: var(--accent); }
.badge-rec { background: rgba(78,203,141,0.12); color: var(--green); }
.maps-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 999px;
  padding: 5px 10px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 500;
  text-decoration: none;
  flex-shrink: 0;
  transition: all .2s;
  font-family: 'DM Sans', sans-serif;
}
.maps-btn:active { opacity: 0.7; }
.maps-btn svg { width: 11px; height: 11px; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 200;
  background: rgba(14,14,16,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
  gap: 8px;
}
.nav-btn {
  flex: 1;
  padding: 12px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  text-align: center;
  line-height: 1.2;
}
.nav-btn .nav-date { font-size: 10px; font-weight: 400; font-family: 'DM Sans', sans-serif; display: block; margin-top: 2px; }
.nav-btn.active {
  background: var(--accent);
  color: #0e0e10;
  border-color: var(--accent);
}
.nav-btn .nav-check {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  margin-left: 4px;
  vertical-align: middle;
}

/* CONFETTI overlay */
.confetti-wrap {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 2px;
  top: -20px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* EMPTY STATE */
.all-done {
  text-align: center;
  padding: 40px 20px;
  display: none;
}
.all-done-emoji { font-size: 48px; margin-bottom: 12px; }
.all-done-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
.all-done-sub { font-size: 14px; color: var(--muted); font-weight: 300; }

/* ANIMATIONS */
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.stop-card { animation: slideIn .3s ease both; }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div>
      <div class="header-title">Outlets <span>Orlando</span></div>
      <div class="header-subtitle">324 Newcastle Dr · 25–27 enero</div>
    </div>
    <div class="global-counter" id="global-counter">0 / 32</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchDay(0)">Sáb 25/01</button>
    <button class="tab" onclick="switchDay(1)">Dom 26/01</button>
    <button class="tab" onclick="switchDay(2)">Lun 27/01</button>
  </div>
</header>

<div id="panel-0" class="panel active"></div>
<div id="panel-1" class="panel"></div>
<div id="panel-2" class="panel"></div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-0" onclick="switchDay(0)">Día 1<span class="nav-date">Sáb 25/01</span></button>
  <button class="nav-btn" id="nav-1" onclick="switchDay(1)">Día 2<span class="nav-date">Dom 26/01</span></button>

<div class="confetti-wrap" id="confetti-wrap"></div>

      {name:"Ross Dress for Less (Centerview)", desc:"Ideal para ropa. Abre 9am.", url:"https://maps.app.goo.gl/7hHZeAjBQYao9Jgf9"},
      {name:"Marshalls & HomeGoods (Centerview)", desc:"Doble tienda en una. Abre 9:30am, cierra 9:30pm.", url:"https://www.google.com/maps/place/?q=place_id:ChIJ8769dMOG3YgR-Puw_9RCXkI"},
      {name:"Target (Irlo Bronson)", desc:"Ropa, electrónica y hogar. Abre 8am, cierra 11pm.", url:"https://www.google.com/maps/place/?q=place_id:ChIJCXFwusOB3YgR1PJmC5H9YfI"},

      {name:"Dollar General", desc:"Al lado del Target. Básicos y snacks muy baratos. Abre 8am.", url:"https://www.google.com/maps/place/?q=place_id:ChIJdWHY656B3YgRdwgoCjgD7yg"},

    stops: [

      {name:"Ross Dress for Less (Vineland)", desc:"Puesto N°3 @abrazandoamickey. Abre 9am.", url:"https://www.google.com/maps/place/?q=place_id:ChIJ_bAPr7yB3YgRh_ocqK1ELZk", badge:"rec", badgeText:"N°3"},

      {name:"Ross Dress for Less (Regency Village)", desc:"Puesto N°2 @abrazandoamickey. Abre 9am, cierra 11:30pm.", url:"https://www.google.com/maps/place/?q=place_id:ChIJo2qqCVmB3YgRk7dMfRZb3rg", badge:"rec", badgeText:"N°2"},

  {

    stops: [
      {name:"Dollar Tree (Turkey Lake)", desc:"Abre 8am. Rápido, ideal para abrir el día.", url:"https://www.google.com/maps/place/?q=place_id:ChIJ7TDGpbN_54gRtkUuHx5Ac7I"},

      {name:"T.J. Maxx (Grand National / I-Drive)", desc:"Al lado del Burlington de Grand National. Abre 9:30am.", url:"https://www.google.com/maps/place/?q=place_id:ChIJraAOZux-54gRUQVbPxLx1FM"},
      {name:"Burlington (Grand National / I-Drive)", desc:"Justo al lado del T.J. Maxx. Abre 9am, cierra 11pm.", url:"https://www.google.com/maps/place/?q=place_id:ChIJt_6aaWx_54gRcrifzLy1h14"},

      {name:"The Florida Mall", desc:"Mall enorme con muchas marcas. Abre 10am, cierra 8pm (lun–sáb).", url:"https://www.google.com/maps/place/?q=place_id:ChIJIyOEEvd954gR4F34yBVuWSo", badge:"star", badgeText:"⭐ imperdible"},
      {name:"Crazy Hot Buys (Sand Lake Rd)", desc:"Devoluciones de Amazon. Precios escalonados por día. Abre 9am, cierra 8pm.", url:"https://www.google.com/maps/place/?q=place_id:ChIJwQLqzD9954gR43VCqVkESHQ"},
      {name:"Winter Garden Village", desc:"Outlet al aire libre, excelente ambiente. El más alejado (~40 min). Abre 10am, cierra 9pm.", url:"https://www.google.com/maps/place/?q=place_id:ChIJ5bbbouuD54gR0D6cJLHwC9A", badge:"star", badgeText:"⭐ imperdible"}
    ]
  }
];

const STORAGE_KEY = 'outlets-orlando-visited';
const visited = [new Set(), new Set(), new Set()];

function saveState() {
  try {
    const data = visited.map(s => [...s]);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    data.forEach((arr, i) => arr.forEach(v => visited[i].add(v)));
  } catch(e) {}
}

function totalDone() {
  return visited.reduce((acc, s) => acc + s.size, 0);
}
function totalAll() {
  return days.reduce((acc, d) => acc + d.stops.length, 0);
}

function updateGlobal() {
  const done = totalDone();
  const all = totalAll();
  document.getElementById('global-counter').textContent = done + ' / ' + all;
  days.forEach((_, i) => {
    const nav = document.getElementById('nav-' + i);
    const d = days[i];
    const hasProgress = visited[i].size > 0 && visited[i].size < d.stops.length;
    const allDone = visited[i].size === d.stops.length;
    let dot = '';
    if (hasProgress) dot = '<span class="nav-check"></span>';
    if (allDone) dot = ' ✓';
    const labels = ['Día 1', 'Día 2', 'Día 3'];
    const dates = ['Sáb 25/01', 'Dom 26/01', 'Lun 27/01'];
    nav.innerHTML = labels[i] + dot + '<span class="nav-date">' + dates[i] + '</span>';
  });
}

function launchConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  const colors = ['#f5c842','#e8834a','#4ecb8d','#f0ede8','#e87bba'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random()*100}%;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${4 + Math.random()*8}px;
      height: ${4 + Math.random()*8}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${1.5 + Math.random()*2}s;
      animation-delay: ${Math.random()*0.5}s;
    `;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

function toggleStop(dayIdx, stopIdx) {
  if (visited[dayIdx].has(stopIdx)) {
    visited[dayIdx].delete(stopIdx);
  } else {
    visited[dayIdx].add(stopIdx);
    const day = days[dayIdx];
    if (visited[dayIdx].size === day.stops.length) {
      setTimeout(launchConfetti, 200);
    }
  }
  saveState();
  renderDay(dayIdx);
  updateGlobal();
}

function resetDay(d) {
  visited[d].clear();
  saveState();
  renderDay(d);
  updateGlobal();
}

function switchDay(d) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===d));
  document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', i===d));
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i===d));
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderDay(d) {
  const day = days[d];
  const total = day.stops.length;
  const done = visited[d].size;
  const pct = Math.round(done / total * 100);
  const allDone = done === total;

  let html = `
    <a class="hotel-bar" href="${HOTEL.url}">
      <div class="hotel-icon">🏠</div>
      <div class="hotel-info">
        <div class="hotel-label">Punto de partida</div>
        <div class="hotel-addr">${HOTEL.addr}</div>
      </div>
      <div class="hotel-arrow">↗</div>
    </a>
    <div class="day-label">${day.label}</div>
    <div class="progress-wrap">
      <div class="progress-meta">
        <div class="progress-stats">
          <div class="stat"><div class="stat-val ${done>0?'accent':''}">${done}</div><div class="stat-lbl">visitadas</div></div>
          <div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">paradas</div></div>
          <div class="stat"><div class="stat-val ${pct===100?'accent':''}">${pct}%</div><div class="stat-lbl">completado</div></div>
        </div>
        <button class="reset-btn" onclick="resetDay(${d})">↺ reiniciar</button>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>
  `;

  if (allDone && total > 0) {
    html += `<div class="all-done" style="display:block">
      <div class="all-done-emoji">🛍️</div>
      <div class="all-done-title">¡Día completado!</div>
      <div class="all-done-sub">Visitaste las ${total} paradas del día.</div>
    </div>`;
  }

  day.stops.forEach((s, i) => {
    const isV = visited[d].has(i);
    let badge = '';
    if (s.badge === 'star') badge = `<span class="badge badge-star">${s.badgeText}</span>`;
    if (s.badge === 'rec')  badge = `<span class="badge badge-rec">${s.badgeText}</span>`;
    html += `
      <div class="stop-card${isV?' visited':''}" onclick="toggleStop(${d},${i})" style="animation-delay:${i*0.04}s">
        <div class="stop-num">${isV ? '✓' : i+1}</div>
        <div class="stop-body">
          <div class="stop-name">${s.name}</div>
          <div class="stop-desc">${s.desc}</div>
          <div class="stop-footer">
            <div class="badges">${badge}</div>
            <a class="maps-btn" href="${s.url}" onclick="event.stopPropagation()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
              Maps
            </a>
          </div>
        </div>
      </div>`;
  });

  document.getElementById('panel-' + d).innerHTML = html;
}

loadState();
days.forEach((_, i) => renderDay(i));
updateGlobal();
</script>
</body>
</html>
