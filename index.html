<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Orlando</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e10;
  --surface: #17171a;
  --surface2: #1f1f23;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0ede8;
  --muted: #888580;
  --accent: #f5c842;
  --accent2: #e8834a;
  --green: #4ecb8d;
  --green-bg: rgba(78,203,141,0.1);
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: 120px;
  overflow-x: hidden;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 12px;
}
.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 14px;
}
.header-title {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  line-height: 1.1;
}
.header-title span { color: var(--accent); }
.header-subtitle {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
  font-weight: 300;
}
.global-counter {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 999px;
  padding: 6px 14px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  white-space: nowrap;
}

/* TABS */
.tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 999px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: 0.3px;
}
.tab.active {
  background: var(--accent);
  color: #0e0e10;
  border-color: var(--accent);
}

/* PANELS */
.panel { display: none; padding: 0 16px; }
.panel.active { display: block; }

/* HOTEL BAR */
.hotel-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin: 16px 0 12px;
  text-decoration: none;
}
.hotel-icon {
  width: 32px;
  height: 32px;
  background: rgba(245,200,66,0.12);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}
.hotel-info { flex: 1; min-width: 0; }
.hotel-label { font-size: 10px; color: var(--accent); font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 2px; }
.hotel-addr { font-size: 12px; color: var(--muted); font-weight: 300; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hotel-arrow { color: var(--muted); font-size: 14px; }

/* DAY LABEL */
.day-label {
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

/* PROGRESS */
.progress-wrap { margin-bottom: 16px; }
.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.progress-stats { display: flex; gap: 16px; }
.stat { text-align: center; }
.stat-val { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
.stat-lbl { font-size: 10px; color: var(--muted); font-weight: 300; }
.stat-val.accent { color: var(--accent); }
.reset-btn {
  font-size: 11px;
  color: var(--muted);
  background: none;
  border: 1px solid var(--border2);
  border-radius: 999px;
  padding: 4px 12px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all .2s;
}
.reset-btn:active { opacity: 0.6; }
.progress-bar-bg {
  height: 3px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width .4s cubic-bezier(.4,0,.2,1);
}

/* STOP CARDS */
.stop-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.stop-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: transparent;
  transition: background .2s;
}
.stop-card.visited {
  background: var(--surface2);
  border-color: var(--border);
}
.stop-card.visited::before { background: var(--green); }
.stop-card:active { transform: scale(0.98); }

.stop-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  flex-shrink: 0;
  transition: all .2s;
}
.stop-card.visited .stop-num {
  background: var(--green-bg);
  border-color: var(--green);
  color: var(--green);
}

.stop-body { flex: 1; min-width: 0; }
.stop-name {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.3;
  transition: color .2s;
}
.stop-card.visited .stop-name {
  color: var(--muted);
  text-decoration: line-through;
}
.stop-desc {
  font-size: 12px;
  color: var(--muted);
  font-weight: 300;
  line-height: 1.5;
  margin-bottom: 8px;
}
.stop-card.visited .stop-desc { opacity: 0.5; }

.stop-footer { display: flex; align-items: center; justify-content: space-between; }
.badges { display: flex; gap: 5px; flex-wrap: wrap; }
.badge {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 999px;
  letter-spacing: 0.3px;
}
.badge-star { background: rgba(245,200,66,0.15); color: var(--accent); }
.badge-rec { background: rgba(78,203,141,0.12); color: var(--green); }
.maps-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 999px;
  padding: 5px 10px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 500;
  text-decoration: none;
  flex-shrink: 0;
  transition: all .2s;
  font-family: 'DM Sans', sans-serif;
}
.maps-btn:active { opacity: 0.7; }
.maps-btn svg { width: 11px; height: 11px; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 200;
  background: rgba(14,14,16,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
  gap: 8px;
}
.nav-btn {
  flex: 1;
  padding: 12px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  text-align: center;
  line-height: 1.2;
}
.nav-btn .nav-date { font-size: 10px; font-weight: 400; font-family: 'DM Sans', sans-serif; display: block; margin-top: 2px; }
.nav-btn.active {
  background: var(--accent);
  color: #0e0e10;
  border-color: var(--accent);
}
.nav-btn .nav-check {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  margin-left: 4px;
  vertical-align: middle;
}

/* CONFETTI overlay */
.confetti-wrap {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 2px;
  top: -20px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* EMPTY STATE */
.all-done {
  text-align: center;
  padding: 40px 20px;
  display: none;
}
.all-done-emoji { font-size: 48px; margin-bottom: 12px; }
.all-done-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
.all-done-sub { font-size: 14px; color: var(--muted); font-weight: 300; }

/* ANIMATIONS */
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.stop-card { animation: slideIn .3s ease both; }

/* COMIDAS SECTION */
.comidas-panel { padding: 16px 0; }
.day-meal-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  margin-bottom: 10px;
  overflow: hidden;
}
.day-meal-header {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 13px 14px;
  cursor: pointer;
  user-select: none;
}
.meal-day-badge {
  font-family: 'Syne', sans-serif;
  font-size: 10px;
  font-weight: 700;
  padding: 3px 9px;
  border-radius: 999px;
  white-space: nowrap;
  letter-spacing: .3px;
  flex-shrink: 0;
}
.mbadge-disney { background: rgba(91,143,212,.15); color: #5b8fd4; }
.mbadge-universal { background: rgba(212,91,106,.15); color: #d45b6a; }
.mbadge-free { background: rgba(78,203,141,.15); color: #4ecb8d; }
.mbadge-arrival { background: rgba(155,125,212,.15); color: #9b7dd4; }
.mbadge-walmart { background: rgba(245,200,66,.15); color: var(--accent); }
.meal-day-date {
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 600;
  flex: 1;
}
.meal-day-title { font-size: 12px; color: var(--muted); }
.meal-chevron { font-size: 14px; color: var(--muted); transition: transform .25s; margin-left: auto; }
.day-meal-card.open .meal-chevron { transform: rotate(180deg); }
.day-meal-body {
  display: none;
  padding: 0 14px 14px;
  border-top: 1px solid var(--border);
}
.day-meal-card.open .day-meal-body { display: block; }
.meals-row {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 8px;
  margin-top: 12px;
}
@media(max-width:500px){ .meals-row { grid-template-columns: 1fr; } }
.meal-cell {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 9px 11px;
}
.meal-cell-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .7px;
  color: var(--muted);
  margin-bottom: 5px;
  font-weight: 500;
}
.meal-cell-text {
  font-size: 12px;
  color: var(--text);
  line-height: 1.4;
  min-height: 32px;
  cursor: pointer;
  word-break: break-word;
}
.meal-cell-text:hover { color: var(--accent); }
.meal-cell-textarea {
  width: 100%;
  background: transparent;
  border: none;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  line-height: 1.4;
  resize: none;
  min-height: 48px;
  outline: none;
}
.meal-edit-actions {
  display: flex;
  gap: 4px;
  margin-top: 5px;
  justify-content: flex-end;
}
.mbtn {
  font-size: 11px;
  padding: 3px 8px;
  border-radius: 6px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all .15s;
}
.mbtn:hover { background: var(--surface2); color: var(--text); }
.mbtn.msave { border-color: var(--accent); color: var(--accent); }
.mbtn.msave:hover { background: rgba(245,200,66,.1); }
.mbtn.mdel { border-color: #e05c5c; color: #e05c5c; }
.mbtn.mdel:hover { background: rgba(224,92,92,.1); }
.snacks-row {
  margin-top: 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 9px 11px;
}
.snacks-row-label {
  font-size: 10px;
  text-transform: uppercase;
  letter-spacing: .7px;
  color: var(--muted);
  margin-bottom: 6px;
  font-weight: 500;
}
.snack-chips { display: flex; flex-wrap: wrap; gap: 5px; }
.snack-chip {
  font-size: 11px;
  padding: 3px 9px;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 999px;
  color: var(--text);
  display: flex;
  align-items: center;
  gap: 4px;
}
.snack-chip-rm {
  background: none;
  border: none;
  color: var(--muted);
  cursor: pointer;
  font-size: 12px;
  padding: 0;
  line-height: 1;
}
.snack-chip-rm:hover { color: #e05c5c; }
.snack-chip-add {
  font-size: 11px;
  padding: 3px 9px;
  background: transparent;
  border: 1px dashed var(--border2);
  border-radius: 999px;
  color: var(--muted);
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all .15s;
}
.snack-chip-add:hover { border-color: var(--accent); color: var(--accent); }
.snack-inline-input {
  display: flex;
  gap: 5px;
  margin-top: 6px;
  align-items: center;
}
.snack-field {
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  padding: 5px 9px;
  outline: none;
}
.snack-field:focus { border-color: var(--accent); }
.notes-ta {
  width: 100%;
  margin-top: 8px;
  background: transparent;
  border: 1px dashed var(--border2);
  border-radius: 8px;
  color: var(--muted);
  font-family: 'DM Sans', sans-serif;
  font-size: 11px;
  padding: 6px 10px;
  outline: none;
  resize: none;
  font-style: italic;
}
.notes-ta:focus { border-color: var(--accent); color: var(--text); }
.notes-ta::placeholder { color: #444; }
.del-day-row { display: flex; justify-content: flex-end; margin-top: 8px; }
.add-day-fab {
  position: fixed;
  bottom: 80px;
  right: 20px;
  background: var(--accent);
  color: #0e0e10;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  border: none;
  border-radius: 50px;
  padding: 11px 18px;
  cursor: pointer;
  box-shadow: 0 4px 20px rgba(245,200,66,.3);
  transition: all .2s;
  z-index: 150;
  display: none;
}
.add-day-fab:hover { transform: translateY(-2px); }
.modal-bg {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,.75);
  z-index: 300;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-bg.open { display: flex; }
.modal-box {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 22px;
  width: 100%;
  max-width: 420px;
}
.modal-box h2 {
  font-family: 'Syne', sans-serif;
  font-size: 17px;
  font-weight: 700;
  margin-bottom: 14px;
}
.mform-group { margin-bottom: 10px; }
.mform-group label {
  font-size: 11px;
  color: var(--muted);
  display: block;
  margin-bottom: 4px;
  text-transform: uppercase;
  letter-spacing: .5px;
}
.mform-group input, .mform-group select {
  width: 100%;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  padding: 8px 11px;
  outline: none;
}
.mform-group input:focus, .mform-group select:focus { border-color: var(--accent); }
.mform-group select option { background: var(--surface2); }
.modal-actions { display: flex; gap: 8px; margin-top: 14px; justify-content: flex-end; }
.mbtn-primary {
  background: var(--accent);
  color: #0e0e10;
  border: none;
  border-radius: 8px;
  padding: 9px 16px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
}
.mbtn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 9px 16px;
  font-family: 'DM Sans', sans-serif;
  font-size: 13px;
  cursor: pointer;
}
.mtoast {
  position: fixed;
  bottom: 85px;
  left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 9px 16px;
  font-size: 12px;
  color: var(--text);
  opacity: 0;
  transition: all .3s;
  z-index: 400;
  pointer-events: none;
  white-space: nowrap;
}
.mtoast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header class="header">
  <div class="header-top">
    <div>
      <div class="header-title">Outlets <span>Orlando</span></div>
      <div class="header-subtitle">324 Newcastle Dr · 25–27 enero</div>
    </div>
    <div class="global-counter" id="global-counter">0 / 32</div>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchDay(0)">Sáb 25/01</button>
    <button class="tab" onclick="switchDay(1)">Dom 26/01</button>
    <button class="tab" onclick="switchDay(2)">Lun 27/01</button>
    <button class="tab" onclick="switchSection('comidas')">🍽️ Comidas</button>
  </div>
</header>

<div id="panel-0" class="panel active"></div>
<div id="panel-1" class="panel"></div>
<div id="panel-2" class="panel"></div>
<div id="panel-comidas" class="panel"></div>

<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-0" onclick="switchDay(0)">Día 1<span class="nav-date">Sáb 25/01</span></button>
  <button class="nav-btn" id="nav-1" onclick="switchDay(1)">Día 2<span class="nav-date">Dom 26/01</span></button>
  <button class="nav-btn" id="nav-2" onclick="switchDay(2)">Día 3<span class="nav-date">Lun 27/01</span></button>
  <button class="nav-btn" id="nav-comidas" onclick="switchSection('comidas')">🍽️<span class="nav-date">Comidas</span></button>
</nav>

<div class="confetti-wrap" id="confetti-wrap"></div>

<script>
const HOTEL = {
  addr: "324 Newcastle Dr, Kissimmee FL 34746",
  url: "https://www.google.com/maps/search/?api=1&query=28.3223251,-81.4939467"
};

const days = [
  {
    label: "Zona Kissimmee Este — The Loop & Osceola Pkwy. ",
    stops: [
      {name:"Goodwill", desc:"Thrift store. Caza tesoros. Abre 9am, cierra 9pm.", url:"https://www.google.com/maps/place/?q=place_id:ChIJD1yqd4mB3YgRfrO0gY3gLSM"},
      {name:"T.J. Maxx", desc:"Ropa y accesorios de marca. Abre 9:30am, cierra 9:30pm.", url:"https://www.google.com/maps/place/?q=place_id:ChIJl83fqzOB3YgR7C8d5KHaU2E"},
      {name:"Nike Clearance Store", desc:"Imperdible. Enorme tienda de clearance. Ir temprano, el stock se agota. Abre 10am.", url:"https://www.google.com/maps/place/?q=place_id:ChIJZY6QIH-B3YgRT_eBW7p1gxg", badge:"star", badgeText:"⭐ imperdible"},

const STORAGE_KEY = 'outlets-orlando-visited';
const visited = [new Set(), new Set(), new Set()];

function saveState() {
  try {
    const data = visited.map(s => [...s]);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch(e) {}
}

function loadState() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const data = JSON.parse(raw);
    data.forEach((arr, i) => arr.forEach(v => visited[i].add(v)));
  } catch(e) {}
}

function totalDone() {
  return visited.reduce((acc, s) => acc + s.size, 0);
}
function totalAll() {
  return days.reduce((acc, d) => acc + d.stops.length, 0);
}

function updateGlobal() {
  const done = totalDone();
  const all = totalAll();
  document.getElementById('global-counter').textContent = done + ' / ' + all;
  days.forEach((_, i) => {
    const nav = document.getElementById('nav-' + i);
    const d = days[i];
    const hasProgress = visited[i].size > 0 && visited[i].size < d.stops.length;
    const allDone = visited[i].size === d.stops.length;
    let dot = '';
    if (hasProgress) dot = '<span class="nav-check"></span>';
    if (allDone) dot = ' ✓';
    const labels = ['Día 1', 'Día 2', 'Día 3'];
    const dates = ['Sáb 25/01', 'Dom 26/01', 'Lun 27/01'];
    nav.innerHTML = labels[i] + dot + '<span class="nav-date">' + dates[i] + '</span>';
  });
}

function launchConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  const colors = ['#f5c842','#e8834a','#4ecb8d','#f0ede8','#e87bba'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random()*100}%;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${4 + Math.random()*8}px;
      height: ${4 + Math.random()*8}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${1.5 + Math.random()*2}s;
      animation-delay: ${Math.random()*0.5}s;
    `;
    wrap.appendChild(el);
    setTimeout(() => el.remove(), 4000);
  }
}

function toggleStop(dayIdx, stopIdx) {
  if (visited[dayIdx].has(stopIdx)) {
    visited[dayIdx].delete(stopIdx);
  } else {
    visited[dayIdx].add(stopIdx);
    const day = days[dayIdx];
    if (visited[dayIdx].size === day.stops.length) {
      setTimeout(launchConfetti, 200);
    }
  }
  saveState();
  renderDay(dayIdx);
  updateGlobal();
}

function resetDay(d) {
  visited[d].clear();
  saveState();
  renderDay(d);
  updateGlobal();
}

function switchDay(d) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', i===d));
  document.querySelectorAll('.panel').forEach((p,i) => p.classList.toggle('active', i===d));
  document.querySelectorAll('.nav-btn').forEach((b,i) => b.classList.toggle('active', i===d));
  window.scrollTo({top:0, behavior:'smooth'});
}

function renderDay(d) {
  const day = days[d];
  const total = day.stops.length;
  const done = visited[d].size;
  const pct = Math.round(done / total * 100);
  const allDone = done === total;

  let html = `
    <a class="hotel-bar" href="${HOTEL.url}">
      <div class="hotel-icon">🏠</div>
      <div class="hotel-info">
        <div class="hotel-label">Punto de partida</div>
        <div class="hotel-addr">${HOTEL.addr}</div>
      </div>
      <div class="hotel-arrow">↗</div>
    </a>
    <div class="day-label">${day.label}</div>
    <div class="progress-wrap">
      <div class="progress-meta">
        <div class="progress-stats">
          <div class="stat"><div class="stat-val ${done>0?'accent':''}">${done}</div><div class="stat-lbl">visitadas</div></div>
          <div class="stat"><div class="stat-val">${total}</div><div class="stat-lbl">paradas</div></div>
          <div class="stat"><div class="stat-val ${pct===100?'accent':''}">${pct}%</div><div class="stat-lbl">completado</div></div>
        </div>
        <button class="reset-btn" onclick="resetDay(${d})">↺ reiniciar</button>
      </div>
      <div class="progress-bar-bg"><div class="progress-bar-fill" style="width:${pct}%"></div></div>
    </div>
  `;

  if (allDone && total > 0) {
    html += `<div class="all-done" style="display:block">
      <div class="all-done-emoji">🛍️</div>
      <div class="all-done-title">¡Día completado!</div>
      <div class="all-done-sub">Visitaste las ${total} paradas del día.</div>
    </div>`;
  }

  day.stops.forEach((s, i) => {
    const isV = visited[d].has(i);
    let badge = '';
    if (s.badge === 'star') badge = `<span class="badge badge-star">${s.badgeText}</span>`;
    if (s.badge === 'rec')  badge = `<span class="badge badge-rec">${s.badgeText}</span>`;
    html += `
      <div class="stop-card${isV?' visited':''}" onclick="toggleStop(${d},${i})" style="animation-delay:${i*0.04}s">
        <div class="stop-num">${isV ? '✓' : i+1}</div>
        <div class="stop-body">
          <div class="stop-name">${s.name}</div>
          <div class="stop-desc">${s.desc}</div>
          <div class="stop-footer">
            <div class="badges">${badge}</div>
            <a class="maps-btn" href="${s.url}" onclick="event.stopPropagation()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z"/><circle cx="12" cy="9" r="2.5"/></svg>
              Maps
            </a>
          </div>
        </div>
      </div>`;
  });

  document.getElementById('panel-' + d).innerHTML = html;
}

loadState();
days.forEach((_, i) => renderDay(i));
updateGlobal();

      `<span class="snack-chip">${s}<button class="snack-chip-rm" onclick="removeSnackM(${day.id},${si})">×</button></span>`
    ).join('');
    html += `
      <div class="day-meal-card" id="mcard-${day.id}">
        <div class="day-meal-header" onclick="toggleMealCard(${day.id})">

                onkeydown="if(event.key==='Enter')addSnackM(${day.id})">

function toggleMealCard(id) {
  document.getElementById('mcard-'+id).classList.toggle('open');
}

function editMealCell(dayId, idx) {
  const cell = document.getElementById(`mcell-${dayId}-${idx}`);
  const textEl = document.getElementById(`mtext-${dayId}-${idx}`);
  const current = mealData.find(d=>d.id===dayId).meals[idx];
  textEl.style.display = 'none';
  const ta = document.createElement('textarea');
  ta.className = 'meal-cell-textarea';
  ta.value = current === '—' ? '' : current;
  cell.appendChild(ta);
  const actions = document.createElement('div');
  actions.className = 'meal-edit-actions';
  actions.innerHTML = `<button class="mbtn" onclick="cancelMealCell(${dayId},${idx})">Cancelar</button>
    <button class="mbtn msave" onclick="saveMealCell(${dayId},${idx})">Guardar</button>`;
  cell.appendChild(actions);
  ta.focus();
}

function saveMealCell(dayId, idx) {
  const cell = document.getElementById(`mcell-${dayId}-${idx}`);
  const ta = cell.querySelector('textarea');
  const val = ta.value.trim() || '—';
  mealData.find(d=>d.id===dayId).meals[idx] = val;
  cell.querySelectorAll('textarea,.meal-edit-actions').forEach(e=>e.remove());
  const textEl = document.getElementById(`mtext-${dayId}-${idx}`);
  textEl.textContent = val;
  textEl.style.display = '';
  showMToast('Guardado ✓');
}

function cancelMealCell(dayId, idx) {
  const cell = document.getElementById(`mcell-${dayId}-${idx}`);
  cell.querySelectorAll('textarea,.meal-edit-actions').forEach(e=>e.remove());
  document.getElementById(`mtext-${dayId}-${idx}`).style.display = '';
}

function showSnackInputM(id) {
  document.getElementById(`msnack-input-${id}`).style.display = 'flex';
  document.getElementById(`msnack-field-${id}`).focus();
}
function hideSnackInputM(id) {
  document.getElementById(`msnack-input-${id}`).style.display = 'none';
  document.getElementById(`msnack-field-${id}`).value = '';
}
function addSnackM(id) {
  const f = document.getElementById(`msnack-field-${id}`);
  const val = f.value.trim();
  if (!val) return;
  mealData.find(d=>d.id===id).snacks.push(val);
  rerenderSnacksM(id);
  hideSnackInputM(id);
  showMToast('Snack agregado ✓');
}
function removeSnackM(id, si) {
  mealData.find(d=>d.id===id).snacks.splice(si,1);
  rerenderSnacksM(id);
}
function rerenderSnacksM(id) {
  const day = mealData.find(d=>d.id===id);
  const chips = day.snacks.map((s,si) =>
    `<span class="snack-chip">${s}<button class="snack-chip-rm" onclick="removeSnackM(${id},${si})">×</button></span>`
  ).join('');
  document.getElementById(`msnack-list-${id}`).innerHTML =
    chips + `<button class="snack-chip-add" onclick="showSnackInputM(${id})">+ agregar</button>`;
}
function saveMealNotes(id, val) {
  mealData.find(d=>d.id===id).notes = val;
}
function deleteMealDay(id) {
  if (!confirm('¿Eliminar este día?')) return;
  mealData = mealData.filter(d=>d.id!==id);
  renderComidas();
  showMToast('Día eliminado');
}
function openMealModal() { document.getElementById('mealModal').classList.add('open'); }
function closeMealModal() { document.getElementById('mealModal').classList.remove('open'); }
function addMealDay() {
  const date = document.getElementById('mDate').value.trim();
  const title = document.getElementById('mTitle').value.trim();
  if (!date || !title) { alert('Completá fecha y título'); return; }
  const newId = Date.now();
  mealData.push({
    id: newId,
    date, title,
    type: document.getElementById('mType').value,
    meals: [
      document.getElementById('mBreakfast').value.trim() || '—',
      document.getElementById('mLunch').value.trim() || '—',
      document.getElementById('mDinner').value.trim() || '—',
    ],
    snacks: [], notes: ''
  });
  renderComidas();
  closeMealModal();
  ['mDate','mTitle','mBreakfast','mLunch','mDinner'].forEach(id=>document.getElementById(id).value='');
  showMToast('Día agregado ✓');
  setTimeout(()=>{ document.getElementById('mcard-'+newId)?.scrollIntoView({behavior:'smooth',block:'center'}); },100);
}

function switchSection(section) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('panel-comidas').classList.add('active');
  document.getElementById('nav-comidas').classList.add('active');
  const tabs = document.querySelectorAll('.tab');
  tabs[tabs.length-1].classList.add('active');
  document.getElementById('addDayFab').style.display = 'block';
  renderComidas();
  window.scrollTo({top:0,behavior:'smooth'});
}

// Override switchDay to hide fab when on outlets
const _origSwitchDay = switchDay;
window.switchDay = function(d) {

};

// listener se registra al final del script, después de que el DOM esté listo
window.addEventListener('DOMContentLoaded', function(){
  document.getElementById('mealModal').addEventListener('click', function(e){
    if(e.target===this) closeMealModal();
  });
});
</script>

<button class="add-day-fab" id="addDayFab" onclick="openMealModal()">+ Agregar día</button>

    <div class="mform-group"><label>Fecha</label><input type="text" id="mDate" placeholder="ej: 29 ene"></div>

        <option value="arrival">Llegada</option>

      </select>
    </div>
    <div class="mform-group"><label>Desayuno</label><input type="text" id="mBreakfast"></div>
    <div class="mform-group"><label>Almuerzo</label><input type="text" id="mLunch"></div>
    <div class="mform-group"><label>Cena</label><input type="text" id="mDinner"></div>
    <div class="modal-actions">
