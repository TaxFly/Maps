<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, setDoc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyCQ-JeQ5sHqv5PC-Md_Qfif3ulXOfyFubc",
  authDomain: "orlando-planning-5c1e1.firebaseapp.com",
  projectId: "orlando-planning-5c1e1",
  storageBucket: "orlando-planning-5c1e1.firebasestorage.app",
  messagingSenderId: "658373278539",
  appId: "1:658373278539:web:83f019075c8f47555dc6ce"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function fbSet(docId, data) {
  try { await setDoc(doc(db, "orlando", docId), data); }
  catch(e) { console.error("fbSet error", e); }
}

async function fbGet(docId) {
  try {
    const snap = await getDoc(doc(db, "orlando", docId));
    return snap.exists() ? snap.data() : null;
  } catch(e) { console.error("fbGet error", e); return null; }
}

function fbListen(docId, callback) {
  return onSnapshot(doc(db, "orlando", docId), snap => {
    if (snap.exists()) callback(snap.data());
  });
}

window._fb = { fbSet, fbGet, fbListen };

function showSyncOverlay(show) {
  let el = document.getElementById('sync-overlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'sync-overlay';
    el.style.cssText = 'position:fixed;inset:0;background:#0e0e10;z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;';
    el.innerHTML = '<div style="font-family:Syne,sans-serif;font-size:18px;font-weight:700;color:#f5c842;">Orlando Planning</div><div style="font-size:13px;color:#888580;">Sincronizando...</div><div class="sync-spinner"></div>';
    const style = document.createElement('style');
    style.textContent = '.sync-spinner{width:28px;height:28px;border:3px solid #1f1f23;border-top-color:#f5c842;border-radius:50%;animation:spin .7s linear infinite;}@keyframes spin{to{transform:rotate(360deg)}}';
    document.head.appendChild(style);
    document.body.appendChild(el);
  }
  el.style.display = show ? 'flex' : 'none';
}

window.addEventListener('DOMContentLoaded', async () => {
  showSyncOverlay(true);

  const results = await Promise.allSettled([
    fbGet('hotel'),
    fbGet('days'),
    fbGet('visited'),
    fbGet('meals'),
    fbGet('walmart'),
    fbGet('wmChecked'),
    fbGet('shopping'),
    fbGet('parques'),
  ]);

  const val = (r) => r.status === 'fulfilled' ? r.value : null;
  const [hotelData, daysData, visitedData, mealDataFb, wmDataFb, wmCheckedFb, shopDataFb, parquesDataFb] = results.map(val);

  if (hotelData) window._hotelFromFb = hotelData;
  if (daysData && daysData.days) window._daysFromFb = daysData.days;
  if (visitedData && visitedData.visited) window._visitedFromFb = visitedData.visited;
  if (mealDataFb && mealDataFb.meals) window._mealsFromFb = mealDataFb.meals;
  if (wmDataFb && wmDataFb.data) window._wmDataFromFb = wmDataFb.data;
  if (wmCheckedFb && wmCheckedFb.checked) window._wmCheckedFromFb = wmCheckedFb.checked;
  if (shopDataFb) window._shopFromFb = shopDataFb;
  if (parquesDataFb && parquesDataFb.state) window._parquesFromFb = parquesDataFb.state;

  window._fbReady = true;
  showSyncOverlay(false);
  if (window._appInit) window._appInit();

  // Realtime listeners
  fbListen('hotel', data => {
    if (window.hotel) { Object.assign(window.hotel, data); window.renderOutlets && window.renderOutlets(); }
  });
  fbListen('visited', data => {
    if (data && data.visited && window.visited) {
      data.visited.forEach((arr, i) => {
        if (window.visited[i]) { window.visited[i].clear(); arr.forEach(v => window.visited[i].add(v)); }
      });
      window.renderOutlets && window.renderOutlets();
      window.updateGlobal && window.updateGlobal();
    }
  });
  fbListen('days', data => {
    if (data && data.days && window.days) {
      const fbVersion = data.v || 1;
      if (fbVersion >= DAYS_VERSION) {
        data.days.forEach((d, i) => { if (i < window.days.length) window.days[i] = d; else window.days.push(d); });
        while (window.visited.length < window.days.length) window.visited.push(new Set());
        window.renderOutlets && window.renderOutlets();
        window.updateGlobal && window.updateGlobal();
      }
    }
  });
  fbListen('meals', data => {
    if (data && data.meals && window._appInited) {
      window._setMealData && window._setMealData(data.meals);
      window.renderComidas && window.renderComidas();
    }
  });
  fbListen('walmart', data => {
    if (data && data.data && window._appInited) {
      window._setWmData && window._setWmData(data.data);
      window.renderWalmart && window.renderWalmart();
    }
  });
  fbListen('wmChecked', data => {
    if (data && data.checked && window.wmChecked) {
      window.wmChecked.clear();
      data.checked.forEach(k => window.wmChecked.add(k));
      window.renderWalmart && window.renderWalmart();
    }
  });
  fbListen('shopping', data => {
    if (data && data.items !== undefined && window._appInited) {
      window._shopFromFb = data;
      window._setShopData && window._setShopData(data);
      window.renderOutlets && window.renderOutlets();
    }
  });
  fbListen('parques', data => {
    if (data && data.state && window._appInited) {
      parquesState = data.state;
      window.renderParques && window.renderParques();
      updateParquesCounter();
    }
  });
});
</script>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0e0e10;
  --surface: #17171a;
  --surface2: #1f1f23;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #f0ede8;
  --muted: #888580;
  --accent: #f5c842;
  --accent2: #e8834a;
  --green: #4ecb8d;
  --green-bg: rgba(78,203,141,0.1);
  --radius: 16px;
  --radius-sm: 10px;
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { background: var(--bg); }
body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding-bottom: calc(80px + env(safe-area-inset-bottom, 0px));
  overflow-x: hidden;
}

/* HEADER */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  padding: 16px 20px 12px;
}
.header-top {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  margin-bottom: 14px;
}
.header-title {
  font-family: 'Syne', sans-serif;
  font-size: 22px;
  font-weight: 800;
  letter-spacing: -0.5px;
  line-height: 1.1;
}
.header-title span { color: var(--accent); }
.header-subtitle {
  font-size: 12px;
  color: var(--muted);
  margin-top: 3px;
  font-weight: 300;
}
.refresh-btn {
  background: none;
  border: 1px solid var(--border2);
  border-radius: 999px;
  color: var(--muted);
  font-size: 15px;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all .2s;
  flex-shrink: 0;
}
.refresh-btn:active { transform: rotate(180deg); opacity: 0.6; }
.refresh-btn.spinning { animation: spinOnce .5s ease; }
@keyframes spinOnce { to { transform: rotate(360deg); } }
.global-counter {
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 999px;
  padding: 6px 14px;
  font-family: 'Syne', sans-serif;
  font-size: 13px;
  font-weight: 700;
  color: var(--accent);
  white-space: nowrap;
}

/* TABS */
.tabs {
  display: flex;
  gap: 8px;
  overflow-x: auto;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
  flex-shrink: 0;
  padding: 8px 16px;
  border-radius: 999px;
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  letter-spacing: 0.3px;
}
.tab.active {
  background: var(--accent);
  color: #0e0e10;
  border-color: var(--accent);
}

/* PANELS */
.panel { display: none; padding: 0 16px; }
.panel.active { display: block; }

/* HOTEL BAR */
.hotel-bar {
  display: flex;
  align-items: center;
  gap: 10px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 14px;
  margin: 16px 0 12px;
  text-decoration: none;
}
.hotel-icon {
  width: 32px;
  height: 32px;
  background: rgba(245,200,66,0.12);
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 15px;
  flex-shrink: 0;
}
.hotel-info { flex: 1; min-width: 0; }
.hotel-label { font-size: 10px; color: var(--accent); font-weight: 600; letter-spacing: 0.8px; text-transform: uppercase; margin-bottom: 2px; }
.hotel-addr { font-size: 12px; color: var(--muted); font-weight: 300; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.hotel-arrow { color: var(--muted); font-size: 14px; }

/* DAY LABEL */
.day-label {
  font-size: 11px;
  color: var(--muted);
  font-weight: 500;
  letter-spacing: 0.5px;
  text-transform: uppercase;
  margin-bottom: 14px;
}

/* PROGRESS */
.progress-wrap { margin-bottom: 16px; }
.progress-meta {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 8px;
}
.progress-stats { display: flex; gap: 16px; }
.stat { text-align: center; }
.stat-val { font-family: 'Syne', sans-serif; font-size: 18px; font-weight: 700; color: var(--text); }
.stat-lbl { font-size: 10px; color: var(--muted); font-weight: 300; }
.stat-val.accent { color: var(--accent); }
.reset-btn {
  font-size: 11px;
  color: var(--muted);
  background: none;
  border: 1px solid var(--border2);
  border-radius: 999px;
  padding: 4px 12px;
  cursor: pointer;
  font-family: 'DM Sans', sans-serif;
  transition: all .2s;
}
.reset-btn:active { opacity: 0.6; }
.progress-bar-bg {
  height: 3px;
  background: var(--surface2);
  border-radius: 2px;
  overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--accent), var(--accent2));
  border-radius: 2px;
  transition: width .4s cubic-bezier(.4,0,.2,1);
}

/* STOP CARDS */
.stop-card {
  display: flex;
  align-items: flex-start;
  gap: 12px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 14px;
  margin-bottom: 10px;
  cursor: pointer;
  transition: all .2s;
  position: relative;
  overflow: hidden;
}
.stop-card::before {
  content: '';
  position: absolute;
  left: 0; top: 0; bottom: 0;
  width: 3px;
  background: transparent;
  transition: background .2s;
}
.stop-card.visited {
  background: var(--surface2);
  border-color: var(--border);
}
.stop-card.visited::before { background: var(--green); }
.stop-card:active { transform: scale(0.98); }
.stop-card .wm-icon-btn:active,
.stop-card a:active { transform: none; }
.stop-card.stop-editing:active { transform: none; }

.stop-num {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  border: 1px solid var(--border2);
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  flex-shrink: 0;
  transition: all .2s;
}
.stop-card.visited .stop-num {
  background: var(--green-bg);
  border-color: var(--green);
  color: var(--green);
}

.stop-body { flex: 1; min-width: 0; }
.stop-name {
  font-family: 'Syne', sans-serif;
  font-size: 14px;
  font-weight: 600;
  color: var(--text);
  margin-bottom: 4px;
  line-height: 1.3;
  transition: color .2s;
}
.stop-card.visited .stop-name {
  color: var(--muted);
  text-decoration: line-through;
}
.stop-desc {
  font-size: 12px;
  color: var(--muted);
  font-weight: 300;
  line-height: 1.5;
  margin-bottom: 8px;
}
.stop-card.visited .stop-desc { opacity: 0.5; }

.stop-footer { display: flex; align-items: center; justify-content: space-between; gap: 6px; }
.stop-footer-actions { display: flex; align-items: center; gap: 5px; flex-shrink: 0; }
.badges { display: flex; gap: 5px; flex-wrap: wrap; }
.badge {
  font-size: 10px;
  font-weight: 600;
  padding: 3px 8px;
  border-radius: 999px;
  letter-spacing: 0.3px;
}
.badge-star { background: rgba(245,200,66,0.15); color: var(--accent); }
.badge-rec { background: rgba(78,203,141,0.12); color: var(--green); }
.maps-btn {
  display: flex;
  align-items: center;
  gap: 5px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  border-radius: 999px;
  padding: 5px 10px;
  color: var(--muted);
  font-size: 11px;
  font-weight: 500;
  text-decoration: none;
  flex-shrink: 0;
  transition: all .2s;
  font-family: 'DM Sans', sans-serif;
}
.maps-btn:active { opacity: 0.7; }
.maps-btn svg { width: 11px; height: 11px; }

/* BOTTOM NAV */
.bottom-nav {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 200;
  background: rgba(14,14,16,0.92);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  display: flex;
  padding: 10px 16px calc(10px + env(safe-area-inset-bottom));
  gap: 8px;
}
.nav-btn {
  flex: 1;
  padding: 12px 8px;
  border-radius: var(--radius-sm);
  border: 1px solid var(--border2);
  background: transparent;
  color: var(--muted);
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  transition: all .2s;
  text-align: center;
  line-height: 1.2;
}
.nav-btn .nav-date { font-size: 10px; font-weight: 400; font-family: 'DM Sans', sans-serif; display: block; margin-top: 2px; }
.nav-btn.active {
  background: var(--accent);
  color: #0e0e10;
  border-color: var(--accent);
}
.nav-btn .nav-check {
  display: inline-block;
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--green);
  margin-left: 4px;
  vertical-align: middle;
}

/* CONFETTI overlay */
.confetti-wrap {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 9999;
  overflow: hidden;
}
.confetti-piece {
  position: absolute;
  width: 8px; height: 8px;
  border-radius: 2px;
  top: -20px;
  animation: confettiFall linear forwards;
}
@keyframes confettiFall {
  to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
}

/* MAP */
.day-map-wrap {
  margin-top: 14px;
  border-radius: var(--radius);
  overflow: hidden;
  border: 1px solid var(--border);
  position: relative;
}
.day-map-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 14px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
}
.day-map-title {
  font-family: 'Syne', sans-serif;
  font-size: 12px;
  font-weight: 700;
  color: var(--muted);
  letter-spacing: 0.4px;
  text-transform: uppercase;
  display: flex;
  align-items: center;
  gap: 6px;
}
.day-map-chevron { font-size: 13px; color: var(--muted); transition: transform .25s; }
.day-map-wrap.open .day-map-chevron { transform: rotate(180deg); }
.day-map-container { height: 280px; isolation: isolate; }
/* Contener los z-indexes de Leaflet dentro del mapa */

.day-map-container .leaflet-pane,
.day-map-container .leaflet-top,
.day-map-container .leaflet-bottom { z-index: auto; }
/* Leaflet popup dark theme */
.leaflet-popup-content-wrapper {
  background: var(--surface2) !important;
  color: var(--text) !important;
  border: 1px solid var(--border2) !important;
  border-radius: 10px !important;

}
.leaflet-popup-tip { background: var(--surface2) !important; }
.leaflet-popup-content { margin: 10px 13px !important; font-family: 'DM Sans', sans-serif !important; }
.map-popup-name { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.map-popup-desc { font-size: 11px; color: #888580; line-height: 1.4; }
.map-pin-visited { filter: grayscale(1) opacity(0.5); }

/* DRAG & DROP */
.stop-card[draggable="true"] { cursor: grab; }
.stop-card[draggable="true"]:active { cursor: grabbing; }
.stop-drag-handle {
  display: flex;
  align-items: center;
  justify-content: center;
  width: 20px;
  flex-shrink: 0;
  color: var(--border2);
  font-size: 14px;
  cursor: grab;
  touch-action: none;
  user-select: none;
}
.stop-drag-handle:hover { color: var(--muted); }
.stop-card.drag-over {
  border-color: var(--accent);
  background: rgba(245,200,66,0.05);
}
.stop-card.dragging {
  opacity: 0.4;
  border-color: var(--accent);
}

/* EMPTY STATE */
.all-done {
  text-align: center;
  padding: 40px 20px;
  display: none;
}
.all-done-emoji { font-size: 48px; margin-bottom: 12px; }
.all-done-title { font-family: 'Syne', sans-serif; font-size: 20px; font-weight: 800; color: var(--accent); margin-bottom: 8px; }
.all-done-sub { font-size: 14px; color: var(--muted); font-weight: 300; }

/* ANIMATIONS */
@keyframes slideIn {
  from { opacity: 0; transform: translateY(8px); }
  to { opacity: 1; transform: translateY(0); }
}
.stop-card { /* animation applied by JS on first render only */ }

/* ═══════════════ COMIDAS SECTION ═══════════════ */

.meal-header-center { flex: 1; min-width: 0; }
.meal-day-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; color: var(--text); margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.meal-day-badge { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 999px; letter-spacing: .3px; display: inline-block; }

.meal-preview { display: flex; gap: 3px; align-items: center; flex-shrink: 0; }
.meal-dot { width: 5px; height: 5px; border-radius: 50%; background: var(--border2); transition: background .2s; }
.meal-dot.filled { background: var(--accent); opacity: 0.7; }
.meal-chevron { font-size: 12px; color: var(--muted); transition: transform .25s; margin-left: 6px; flex-shrink: 0; }
.day-meal-card.open .meal-chevron { transform: rotate(180deg); }
.day-meal-body { display: none; border-top: 1px solid var(--border); }

.meals-stack { }
.meal-row-item {

}

.meal-cell-textarea {

.mbtn { font-size: 11px; padding: 4px 10px; border-radius: 6px; border: 1px solid var(--border2); background: transparent; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .15s; }

.snack-chip-add { font-size: 11px; padding: 3px 10px; background: transparent; border: 1px dashed var(--border2); border-radius: 999px; color: var(--muted); cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .15s; }

.snack-inline-input { display: flex; gap: 5px; margin-top: 6px; align-items: center; }
.snack-field { flex: 1; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 12px; padding: 5px 9px; outline: none; }

/* ═══════════════ WALMART REDESIGN ═══════════════ */
.wm-panel { padding: 12px 0 20px; }
.wm-summary-bar { display: flex; gap: 1px; margin-bottom: 14px; background: var(--border); border-radius: var(--radius-sm); overflow: hidden; border: 1px solid var(--border); }

.wm-progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--accent), var(--accent2)); border-radius: 2px; transition: width .4s cubic-bezier(.4,0,.2,1); }
.wm-section { margin-bottom: 6px; }
.wm-section-header { display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); cursor: pointer; user-select: none; transition: border-color .15s; }

.wm-section-icon { font-size: 16px; }
.wm-section-title { font-family: 'Syne', sans-serif; font-size: 13px; font-weight: 700; flex: 1; }
.wm-section-count { font-size: 11px; color: var(--muted); background: var(--surface2); padding: 2px 8px; border-radius: 999px; font-weight: 500; }
.wm-section-chevron { font-size: 12px; color: var(--muted); transition: transform .2s; }
.wm-section.open .wm-section-chevron { transform: rotate(180deg); }
.wm-items { display: none; flex-direction: column; background: var(--surface); border: 1px solid var(--border2); border-top: none; border-radius: 0 0 var(--radius-sm) var(--radius-sm); overflow: hidden; }
.wm-section.open .wm-items { display: flex; }
.wm-item { display: flex; align-items: center; gap: 10px; padding: 11px 14px; cursor: pointer; transition: background .15s; border-bottom: 1px solid var(--border); position: relative; }
.wm-item:last-child { border-bottom: none; }
.wm-item::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: transparent; transition: background .15s; }
.wm-item.checked { background: var(--surface2); }
.wm-item.checked::before { background: var(--green); }

.wm-check { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border2); display: flex; align-items: center; justify-content: center; font-size: 11px; flex-shrink: 0; transition: all .15s; color: transparent; }
.wm-item.checked .wm-check { background: var(--green-bg); border-color: var(--green); color: var(--green); }
.wm-item-body { flex: 1; min-width: 0; }
.wm-item-name { font-size: 13px; color: var(--text); font-weight: 400; transition: all .15s; }
.wm-item.checked .wm-item-name { color: var(--muted); text-decoration: line-through; }
.wm-item-detail { font-size: 11px; color: var(--muted); margin-top: 2px; font-weight: 300; }
.wm-item-price { font-family: 'Syne', sans-serif; font-size: 12px; font-weight: 700; color: var(--accent); flex-shrink: 0; }

.wm-icon-btn { background: none; border: none; cursor: pointer; font-size: 14px; padding: 4px 5px; border-radius: 6px; opacity: 0.45; transition: opacity .15s, background .15s; line-height: 1; }

.stop-action-btn { width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; font-size: 14px; padding: 0; }

.wm-edit-form { width: 100%; padding: 2px 0; }
.wm-edit-input { width: 100%; background: var(--bg); border: 1px solid var(--border2); border-radius: 8px; color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 13px; padding: 7px 10px; outline: none; margin-bottom: 6px; }

.wm-edit-actions { display: flex; gap: 6px; justify-content: flex-end; }
.wm-reset-btn { font-size: 11px; color: var(--muted); background: none; border: 1px solid var(--border2); border-radius: 999px; padding: 6px 14px; cursor: pointer; font-family: 'DM Sans', sans-serif; transition: all .2s; }
.wm-reset-btn:active { opacity: .6; }

const STORAGE_KEY = 'outlets-orlando-visited-v2';
const DAYS_KEY = 'outlets-orlando-days-v2';
const visited = [new Set(), new Set(), new Set()];
let stopEditingIdx = null; // { dayIdx, stopIdx } or null
let stopAddingDay = null;  // dayIdx or null

function saveState() {
  try {
    const data = visited.map(s => [...s]);
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
    localStorage.setItem(DAYS_KEY, JSON.stringify(days));
  } catch(e) {}
  window._fb && window._fb.fbSet('visited', { visited: visited.map(s => [...s]) });
  window._fb && window._fb.fbSet('days', { days: days, v: DAYS_VERSION });
}

function loadState() {
  if (window._visitedFromFb) {
    window._visitedFromFb.forEach((arr, i) => { if (visited[i]) arr.forEach(v => visited[i].add(v)); });
  } else {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if (raw) { const data = JSON.parse(raw); data.forEach((arr, i) => arr.forEach(v => visited[i].add(v))); }
    } catch(e) {}
  }
  if (window._daysFromFb) {
    const fbVersion = window._daysFromFb._v || 1;
    if (fbVersion < DAYS_VERSION) {
      // Las coords del código son más nuevas: actualizar paradas en Firebase
      // pero preservar labels personalizados si los hay
      window._daysFromFb.forEach((fbDay, i) => {
        if (i < days.length && fbDay.label) days[i].label = fbDay.label;
        // Las stops se toman del código (coords corregidas)
      });
      // Guardar en Firebase con la versión nueva
      window._fb && window._fb.fbSet('days', { days: days, v: DAYS_VERSION });
    } else {
      window._daysFromFb.forEach((d, i) => { if (i < days.length) days[i] = d; else days.push(d); });
      while (visited.length < days.length) visited.push(new Set());
    }
  } else {
    try {
      const rawDays = localStorage.getItem(DAYS_KEY);
      if (rawDays) {
        const savedDays = JSON.parse(rawDays);
        if (savedDays.length >= days.length) {
          savedDays.forEach((d, i) => { if (i < days.length) days[i] = d; else days.push(d); });
          while (visited.length < days.length) visited.push(new Set());
        }
      }
    } catch(e) {}
  }
}

function totalDone() {
  return visited.reduce((acc, s) => acc + s.size, 0);
}
function totalAll() {
  return days.reduce((acc, d) => acc + d.stops.length, 0);
}

function hardRefresh() {
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.classList.add('spinning'); setTimeout(() => btn.classList.remove('spinning'), 500); }
  // Force reload bypassing cache
  window.location.reload(true);
}

function updateGlobal() {
  const done = totalDone();
  const all = totalAll();
  document.getElementById('global-counter').textContent = done + ' / ' + all;
}

function launchConfetti() {
  const wrap = document.getElementById('confetti-wrap');
  wrap.innerHTML = '';
  const colors = ['#f5c842','#e8834a','#4ecb8d','#f0ede8','#e87bba'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.cssText = `
      left: ${Math.random()*100}%;
      background: ${colors[Math.floor(Math.random()*colors.length)]};
      width: ${4 + Math.random()*8}px;
      height: ${4 + Math.random()*8}px;
      border-radius: ${Math.random() > 0.5 ? '50%' : '2px'};
      animation-duration: ${1.5 + Math.random()*2}s;
      animation-delay: ${Math.random()*0.5}s;
    `;
    wrap.appendChild(el);

function editMealCell(dayId, idx) {
  const row = document.getElementById(`mcell-${dayId}-${idx}`);
  if (row.classList.contains('editing')) return;
  // Close any other open editor
  document.querySelectorAll('.meal-row-item.editing').forEach(r => {
    const [,dId,i] = r.id.split('-');
    cancelMealCell(Number(dId), Number(i));
  });
  const current = mealData.find(d=>d.id===dayId).meals[idx];
  row.classList.add('editing');
  row.onclick = null;
  row.innerHTML = `
    <span class="meal-row-label">${mealNames[idx]}</span>
    <div style="flex:1;display:flex;flex-direction:column;gap:6px">
      <textarea class="meal-cell-textarea" id="mta-${dayId}-${idx}" placeholder="¿Qué van a comer?">${current === '—' ? '' : current}</textarea>
      <div class="meal-edit-actions">
        <button class="mbtn" onclick="cancelMealCell(${dayId},${idx})">Cancelar</button>
        <button class="mbtn msave" onclick="saveMealCell(${dayId},${idx})">Guardar</button>
      </div>
    </div>`;
  document.getElementById(`mta-${dayId}-${idx}`).focus();
}

function saveMealCell(dayId, idx) {
  const ta = document.getElementById(`mta-${dayId}-${idx}`);
  const val = ta.value.trim() || '—';
  mealData.find(d=>d.id===dayId).meals[idx] = val;
  mealSave();
  showMToast('Guardado ✓');
  // Re-render just this row
  const row = document.getElementById(`mcell-${dayId}-${idx}`);
  row.classList.remove('editing');
  row.onclick = () => editMealCell(dayId, idx);
  row.innerHTML = `
    <span class="meal-row-label">${mealNames[idx]}</span>
    <span class="meal-row-text${val === '—' ? ' empty' : ''}" id="mtext-${dayId}-${idx}">${val === '—' ? 'Sin planificar' : val}</span>
    <span class="meal-row-edit-icon">✎</span>`;
}

function cancelMealCell(dayId, idx) {
  const current = mealData.find(d=>d.id===dayId).meals[idx];
  const row = document.getElementById(`mcell-${dayId}-${idx}`);
  if (!row) return;
  row.classList.remove('editing');
  row.onclick = () => editMealCell(dayId, idx);
  row.innerHTML = `
    <span class="meal-row-label">${mealNames[idx]}</span>
    <span class="meal-row-text${(!current || current === '—') ? ' empty' : ''}" id="mtext-${dayId}-${idx}">${(!current || current === '—') ? 'Sin planificar' : current}</span>
    <span class="meal-row-edit-icon">✎</span>`;
}

function showSnackInputM(id) {

function hideSnackInputM(id) {

function addSnackM(id) {
  const f = document.getElementById(`msnack-field-${id}`);
  const val = f.value.trim();
  if (!val) return;
  mealData.find(d=>d.id===id).snacks.push(val);
  rerenderSnacksM(id);
  hideSnackInputM(id);
  mealSave();
  showMToast('Snack agregado ✓');
}
function removeSnackM(id, si) {
  mealData.find(d=>d.id===id).snacks.splice(si,1);
  mealSave();
  rerenderSnacksM(id);
}
function rerenderSnacksM(id) {
  const day = mealData.find(d=>d.id===id);
  const chips = day.snacks.map((s,si) =>
    `<span class="snack-chip">${s}<button class="snack-chip-rm" onclick="removeSnackM(${id},${si})">×</button></span>`
  ).join('');
  document.getElementById(`msnack-list-${id}`).innerHTML =
    chips + `<button class="snack-chip-add" onclick="showSnackInputM(${id})">+ agregar</button>`;
}

function addMealDay() {
  const date = document.getElementById('mDate').value.trim();
  const title = document.getElementById('mTitle').value.trim();
  let hasError = false;
  ['mDate','mTitle'].forEach(id => {
    const el = document.getElementById(id);
    const err = document.getElementById(id + '-err');
    if (!el.value.trim()) {
      el.classList.add('error');
      if (err) err.classList.add('show');
      hasError = true;
    } else {
      el.classList.remove('error');
      if (err) err.classList.remove('show');
    }
  });
  if (hasError) return;
  const newId = Date.now();
  mealData.push({
    id: newId,
    date, title,
    type: document.getElementById('mType').value,
    meals: [
      document.getElementById('mBreakfast').value.trim() || '—',
      document.getElementById('mLunch').value.trim() || '—',
      document.getElementById('mDinner').value.trim() || '—',
    ],

  });

  renderComidas();
  closeMealModal();
  ['mDate','mTitle','mBreakfast','mLunch','mDinner'].forEach(id=>document.getElementById(id).value='');

let _syncTimer = null;
function syncDotState(state) {
  const dot = document.getElementById('sync-dot');
  if (!dot) return;
  dot.className = 'sync-dot' + (state ? ' ' + state : '');
  if (state === 'saved') {
    clearTimeout(_syncTimer);
    _syncTimer = setTimeout(() => { dot.className = 'sync-dot'; }, 2500);
  }
}

// Wrap fbSet to show sync feedback — called after _appInit when window._fb is guaranteed to exist
function patchFbSyncDot() {
  if (!window._fb) return;
  const orig = window._fb.fbSet;
  window._fb.fbSet = async function(docId, data) {
    syncDotState('saving');
    try {
      await orig(docId, data);
      syncDotState('saved');
    } catch(e) {
      syncDotState('error');
      console.error('fbSet error', e);
    }
  };
}

let _confirmResolve = null;
function showConfirm(msg, title = '¿Confirmar?', okLabel = 'Eliminar', safe = false) {
  return new Promise(resolve => {
    _confirmResolve = resolve;
    document.getElementById('confirmTitle').textContent = title;
    document.getElementById('confirmMsg').textContent = msg;
    const okBtn = document.getElementById('confirmOk');
    okBtn.textContent = okLabel;
    okBtn.className = 'confirm-btn-ok' + (safe ? ' safe' : '');
    document.getElementById('confirmOverlay').classList.add('open');
    okBtn.onclick = () => { document.getElementById('confirmOverlay').classList.remove('open'); resolve(true); };
    document.getElementById('confirmCancel').onclick = () => { document.getElementById('confirmOverlay').classList.remove('open'); resolve(false); };
  });
}
function showAlert(msg, title = 'Atención') {
  return new Promise(resolve => {
    document.getElementById('alertTitle').textContent = title;
    document.getElementById('alertMsg').textContent = msg;
    document.getElementById('alertOverlay').classList.add('open');
    document.getElementById('alertOk').onclick = () => { closeAlert(); resolve(); };
  });
}
function closeAlert() {
  document.getElementById('alertOverlay').classList.remove('open');
}

let wmChecked = new Set();
let wmOpenSections = new Set(Object.keys(wmCatMeta));
let wmEditingItem = null; // { catId, itemId } or null

function wmSave() {
  try {
    localStorage.setItem(WM_DATA_KEY, JSON.stringify(wmData));
    localStorage.setItem(WM_CHECKED_KEY, JSON.stringify([...wmChecked]));
    localStorage.setItem(WM_OPEN_KEY, JSON.stringify([...wmOpenSections]));
  } catch(e){}
  window._fb && window._fb.fbSet('walmart', { data: wmData });
  window._fb && window._fb.fbSet('wmChecked', { checked: [...wmChecked] });
}

function wmLoad() {
  if (window._wmDataFromFb) { wmData = window._wmDataFromFb; }
  else {
    try { const d = localStorage.getItem(WM_DATA_KEY); if (d) wmData = JSON.parse(d); } catch(e){}
  }
  if (window._wmCheckedFromFb) { window._wmCheckedFromFb.forEach(k => wmChecked.add(k)); }
  else {
    try { const c = localStorage.getItem(WM_CHECKED_KEY); if (c) JSON.parse(c).forEach(k => wmChecked.add(k)); } catch(e){}
  }
  try {
    const o = localStorage.getItem(WM_OPEN_KEY);
    if (o) { wmOpenSections.clear(); JSON.parse(o).forEach(k => wmOpenSections.add(k)); }
  } catch(e){}
}

function wmGetCat(catId) { return wmData.find(c => c.id === catId); }
function wmGetItem(catId, itemId) { return wmGetCat(catId)?.items.find(i => i.id === itemId); }

function wmItemPrice(item) { return (item.qty || 1) * (item.price || 0); }

function wmTotalAll() { return wmData.reduce((a,c) => a + c.items.reduce((b,i) => b + wmItemPrice(i), 0), 0); }
function wmTotalChecked() {
  let t = 0;
  wmData.forEach(cat => cat.items.forEach(item => {
    if (wmChecked.has(item.id)) t += wmItemPrice(item);
  }));
  return t;
}
function wmCountAll() { return wmData.reduce((a,c) => a + c.items.length, 0); }

function wmToggle(itemId, e) {
  e.stopPropagation();
  if (wmChecked.has(itemId)) wmChecked.delete(itemId);
  else wmChecked.add(itemId);
  wmSave();
  renderWalmart();
}

function wmToggleSection(catId) {
  if (wmOpenSections.has(catId)) wmOpenSections.delete(catId);
  else wmOpenSections.add(catId);
  wmSave();
  renderWalmart();
}

async function wmDeleteItem(catId, itemId, e) {
  e.stopPropagation();
  const ok = await showConfirm('¿Eliminar este producto de la lista?', '¿Eliminar producto?', 'Eliminar');
  if (!ok) return;
  const cat = wmGetCat(catId);
  cat.items = cat.items.filter(i => i.id !== itemId);
  wmChecked.delete(itemId);
  wmSave();
  renderWalmart();
  showMToast('Producto eliminado');
}

function wmStartEdit(catId, itemId, e) {
  e.stopPropagation();
  wmEditingItem = { catId, itemId };
  renderWalmart();
  setTimeout(() => document.getElementById('wm-edit-name')?.focus(), 50);
}

function wmCancelEdit() {
  wmEditingItem = null;
  renderWalmart();
}

function wmSaveEdit() {
  const { catId, itemId } = wmEditingItem;
  const item = wmGetItem(catId, itemId);
  const name = document.getElementById('wm-edit-name').value.trim();
  const qty  = parseFloat(document.getElementById('wm-edit-qty').value) || 1;
  const unit = document.getElementById('wm-edit-unit').value.trim();
  const price= parseFloat(document.getElementById('wm-edit-price').value) || 0;
  if (!name) return;
  item.name  = name;
  item.qty   = qty;
  item.unit  = unit;
  item.price = price;
  wmEditingItem = null;
  wmSave();
  renderWalmart();
  showMToast('Guardado ✓');
}

function wmOpenAddModal() {
  document.getElementById('wmAddModal').classList.add('open');
  document.getElementById('wm-add-name').focus();
}
function wmCloseAddModal() {
  document.getElementById('wmAddModal').classList.remove('open');
  ['wm-add-name','wm-add-qty','wm-add-unit','wm-add-price'].forEach(id => {
    document.getElementById(id).value = '';
  });
}
function wmAddItem() {
  const name  = document.getElementById('wm-add-name').value.trim();
  const catId = document.getElementById('wm-add-cat').value;
  const qty   = parseFloat(document.getElementById('wm-add-qty').value) || 1;
  const unit  = document.getElementById('wm-add-unit').value.trim() || '';
  const price = parseFloat(document.getElementById('wm-add-price').value) || 0;
  if (!name) {
    const el = document.getElementById('wm-add-name');
    el.classList.add('error');
    document.getElementById('wm-add-name-err').classList.add('show');
    el.focus();
    return;
  }
  const cat = wmGetCat(catId);
  const newId = 'custom-' + Date.now();
  cat.items.push({ id: newId, name, qty, unit, price });
  wmOpenSections.add(catId);
  wmSave();
  renderWalmart();
  wmCloseAddModal();
  showMToast('Producto agregado ✓');
}

async function wmReset() {
  const ok = await showConfirm('Se van a desmarcar todos los productos del carrito.', '¿Reiniciar checks?', 'Reiniciar', true);
  if (!ok) return;
  wmChecked.clear();
  wmSave();
  renderWalmart();
}

function renderWalmart() {
  const panel = document.getElementById('panel-walmart');
  const total = wmCountAll();
  const checked = wmChecked.size;
  const pct = total > 0 ? Math.round(checked / total * 100) : 0;
  const totalAll = wmTotalAll().toFixed(2);
  const totalChk = wmTotalChecked().toFixed(2);

  let html = '<div class="wm-panel">';

  html += `
    <div class="wm-summary-bar">
      <div class="wm-stat"><div class="wm-stat-val">${checked}</div><div class="wm-stat-lbl">en carrito</div></div>
      <div class="wm-stat"><div class="wm-stat-val">${total - checked}</div><div class="wm-stat-lbl">pendientes</div></div>
      <div class="wm-stat"><div class="wm-stat-val">${pct}%</div><div class="wm-stat-lbl">listo</div></div>
    </div>
    <div class="wm-total-bar">
      <span class="wm-total-label">Total del carrito</span>
      <span class="wm-total-val">$${totalChk} <span style="font-size:12px;color:var(--muted);font-weight:400;">/ $${totalAll}</span></span>
    </div>
    <div class="wm-progress-bar-bg">
      <div class="wm-progress-bar-fill" style="width:${pct}%"></div>
    </div>`;

  wmData.forEach(cat => {
    const meta = wmCatMeta[cat.id] || { icon:'📦', title: cat.id };
    const catDone = cat.items.filter(i => wmChecked.has(i.id)).length;
    const isOpen = wmOpenSections.has(cat.id);
    const isEditing = wmEditingItem?.catId === cat.id;

    html += `
      <div class="wm-section ${isOpen?'open':''}" id="wmsec-${cat.id}">
        <div class="wm-section-header" onclick="wmToggleSection('${cat.id}')">
          <span class="wm-section-icon">${meta.icon}</span>
          <span class="wm-section-title">${meta.title}</span>
          <span class="wm-section-count">${catDone}/${cat.items.length}</span>
          <span class="wm-section-chevron">▾</span>
        </div>
        <div class="wm-items">`;

    cat.items.forEach(item => {
      const isChecked = wmChecked.has(item.id);
      const isEditingThis = wmEditingItem?.catId === cat.id && wmEditingItem?.itemId === item.id;
      const lineTotal = (wmItemPrice(item)).toFixed(2);

      if (isEditingThis) {
        html += `
          <div class="wm-item wm-item-editing" onclick="event.stopPropagation()">
            <div class="wm-edit-form">
              <input class="wm-edit-input wm-edit-name" id="wm-edit-name" placeholder="Nombre del producto" value="${item.name.replace(/"/g,'&quot;')}">
              <div class="wm-edit-row">
                <input class="wm-edit-input wm-edit-small" id="wm-edit-qty" type="number" min="0.1" step="0.1" placeholder="Cant." value="${item.qty}">
                <input class="wm-edit-input wm-edit-unit" id="wm-edit-unit" placeholder="Unidad (oz, lb, caja…)" value="${item.unit.replace(/"/g,'&quot;')}">
                <input class="wm-edit-input wm-edit-small" id="wm-edit-price" type="number" min="0" step="0.01" placeholder="$ c/u" value="${item.price}">
              </div>
              <div class="wm-edit-hint">Precio unitario. Total = cantidad × precio.</div>
              <div class="wm-edit-actions">
                <button class="mbtn" onclick="wmCancelEdit()">Cancelar</button>
                <button class="mbtn msave" onclick="wmSaveEdit()">Guardar</button>
              </div>
            </div>
          </div>`;
      } else {
        html += `
          <div class="wm-item ${isChecked?'checked':''}" onclick="wmToggle('${item.id}', event)">
            <div class="wm-check">${isChecked?'✓':''}</div>
            <div class="wm-item-body">
              <div class="wm-item-name">${item.name}</div>
              <div class="wm-item-detail">${item.qty} ${item.unit}</div>
            </div>
            <div style="display:flex;align-items:center;gap:6px;flex-shrink:0">
              <div class="wm-item-price">$${lineTotal}</div>
              <button class="wm-icon-btn" onclick="wmStartEdit('${cat.id}','${item.id}',event)" title="Editar" aria-label="Editar ${item.name}">✏️</button>
              <button class="wm-icon-btn wm-icon-del" onclick="wmDeleteItem('${cat.id}','${item.id}',event)" title="Eliminar" aria-label="Eliminar ${item.name}">✕</button>
            </div>
          </div>`;
      }
    });

    html += `</div></div>`;
  });

  html += `
    <div style="display:flex;gap:8px;margin-top:14px;justify-content:center">
      <button class="wm-reset-btn" onclick="wmOpenAddModal()">+ Agregar producto</button>
      <button class="wm-reset-btn" onclick="wmReset()">↺ Reiniciar checks</button>
    </div>`;
  html += '</div>';
  panel.innerHTML = html;
}

function switchSection(section) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));

  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

  document.getElementById('panel-' + section).classList.add('active');
  document.getElementById('nav-' + section).classList.add('active');
  document.getElementById('maintab-' + section).classList.add('active');

  // Update header title & theme
  const meta = sectionMeta[section];
  document.getElementById('main-title').innerHTML = meta.title + ' <span class="ht-accent">' + meta.accent + '</span>';
  document.getElementById('main-subtitle').textContent = meta.subtitle;
  document.body.className = meta.theme;

  document.getElementById('addDayFab').style.display = section === 'comidas' ? 'block' : 'none';

  if (section === 'comidas') renderComidas();
  if (section === 'walmart') renderWalmart();
  if (section === 'outlets') renderOutlets();
  if (section === 'parques') renderParques();

  // Update global counter label for parques
  if (section === 'parques') {
    updateParquesCounter();
  } else {
    updateGlobal();
  }

  window.scrollTo({top:0,behavior:'smooth'});
}

// ─── MAP LOGIC ──────────────────────────────────────────────
let _leafletMap = null;

function initDayMap(d) {
  const container = document.getElementById(`day-map-container-${d}`);
  if (!container) return;

  // Destroy previous map instance
  if (_leafletMap) {
    _leafletMap.remove();
    _leafletMap = null;
  }
  container.innerHTML = '';

  const day = days[d];
  const stopsWithCoords = day.stops.filter(s => s.lat && s.lng);
  if (!stopsWithCoords.length) return;

  _leafletMap = L.map(container, { zoomControl: true, attributionControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
  }).addTo(_leafletMap);

  const bounds = [];

  stopsWithCoords.forEach((s) => {
    const originalIdx = day.stops.indexOf(s);
    const isVisited = visited[d].has(originalIdx);
    const isStar = s.badge === 'star';
    const isRec = s.badge === 'rec';

    const color = isVisited ? '#555' : isStar ? '#f5c842' : isRec ? '#4ecb8d' : '#e8834a';
    const icon = L.divIcon({
      className: '',
      html: `<div style="
        width:28px;height:28px;border-radius:50%;
        background:${color};
        color:${isVisited?'#888':'#0e0e10'};
        display:flex;align-items:center;justify-content:center;
        font-family:'Syne',sans-serif;font-weight:800;font-size:11px;
        border:2px solid ${isVisited?'#333':'rgba(255,255,255,0.25)'};
        box-shadow:0 2px 8px rgba(0,0,0,0.5);
        opacity:${isVisited?'0.5':'1'};
      ">${originalIdx + 1}</div>`,
      iconSize: [28, 28],
      iconAnchor: [14, 14],
      popupAnchor: [0, -16]
    });

    const badgeHtml = isStar ? `<span style="font-size:10px;color:#f5c842">⭐ Imperdible</span>` :
                      isRec  ? `<span style="font-size:10px;color:#4ecb8d">✅ ${s.badgeText}</span>` : '';
    const visitedHtml = isVisited ? `<span style="font-size:10px;color:#4ecb8d">✓ Visitado</span>` : '';

    L.marker([s.lat, s.lng], { icon })
      .bindPopup(`
        <div class="map-popup-name">${originalIdx + 1}. ${s.name}</div>
        <div class="map-popup-desc">${s.desc}</div>
        ${badgeHtml || visitedHtml ? `<div style="margin-top:5px;display:flex;gap:6px">${badgeHtml}${visitedHtml}</div>` : ''}
        ${s.url ? `<a href="${s.url}" target="_blank" style="display:inline-block;margin-top:7px;font-size:11px;color:#f5c842;text-decoration:none;font-family:'Syne',sans-serif;font-weight:600">↗ Abrir en Maps</a>` : ''}
      `, { maxWidth: 220 })
      .addTo(_leafletMap);

    bounds.push([s.lat, s.lng]);
  });

  _leafletMap.fitBounds(bounds, { padding: [28, 28] });
  setTimeout(() => _leafletMap && _leafletMap.invalidateSize(), 150);
}

async function stopDelete(dayIdx, stopIdx, e) {
  e && e.stopPropagation();
  const ok = await showConfirm('¿Eliminar esta parada del cronograma?', '¿Eliminar parada?', 'Eliminar');
  if (!ok) return;
  days[dayIdx].stops.splice(stopIdx, 1);
  // Rebuild visited set for this day to avoid index gaps
  const newVisited = new Set();
  [...visited[dayIdx]].forEach(idx => { if (idx < stopIdx) newVisited.add(idx); else if (idx > stopIdx) newVisited.add(idx - 1); });
  visited[dayIdx] = newVisited;
  saveState();
  renderOutlets();
  updateGlobal();
  showMToast('Parada eliminada');
}

// ─── MOVE UP / DOWN ─────────────────────────────────────────
function stopMoveUp(dayIdx, stopIdx, e) {
  e && e.stopPropagation();
  if (stopIdx === 0) return;
  const stops = days[dayIdx].stops;
  [stops[stopIdx - 1], stops[stopIdx]] = [stops[stopIdx], stops[stopIdx - 1]];
  // Fix visited indices
  const vis = visited[dayIdx];
  const hadPrev = vis.has(stopIdx - 1);
  const hadCurr = vis.has(stopIdx);
  if (hadPrev) vis.add(stopIdx); else vis.delete(stopIdx);
  if (hadCurr) vis.add(stopIdx - 1); else vis.delete(stopIdx - 1);
  saveState();
  renderOutlets();
}
function stopMoveDown(dayIdx, stopIdx, e) {
  e && e.stopPropagation();
  if (stopIdx >= days[dayIdx].stops.length - 1) return;
  const stops = days[dayIdx].stops;
  [stops[stopIdx], stops[stopIdx + 1]] = [stops[stopIdx + 1], stops[stopIdx]];
  const vis = visited[dayIdx];
  const hadCurr = vis.has(stopIdx);
  const hadNext = vis.has(stopIdx + 1);
  if (hadNext) vis.add(stopIdx); else vis.delete(stopIdx);
  if (hadCurr) vis.add(stopIdx + 1); else vis.delete(stopIdx + 1);
  saveState();
  renderOutlets();
}

// ─── DRAG & DROP ────────────────────────────────────────────
let dragSrc = null; // { dayIdx, stopIdx }
function stopDragStart(dayIdx, stopIdx, e) {
  dragSrc = { dayIdx, stopIdx };
  e.currentTarget.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}
function stopDragOver(dayIdx, stopIdx, e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  if (!dragSrc || (dragSrc.dayIdx === dayIdx && dragSrc.stopIdx === stopIdx)) return;
  document.querySelectorAll('.stop-card.drag-over').forEach(el => el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}
function stopDragEnd(e) {
  e.currentTarget.classList.remove('dragging');
  document.querySelectorAll('.stop-card.drag-over').forEach(el => el.classList.remove('drag-over'));
  dragSrc = null;
}
function stopDrop(dayIdx, stopIdx, e) {
  e.preventDefault();
  e.currentTarget.classList.remove('drag-over');
  if (!dragSrc) return;
  const { dayIdx: srcDay, stopIdx: srcStop } = dragSrc;
  if (srcDay !== dayIdx || srcStop === stopIdx) { dragSrc = null; return; }
  // Reorder stops
  const stops = days[dayIdx].stops;
  const moved = stops.splice(srcStop, 1)[0];
  const targetIdx = srcStop < stopIdx ? stopIdx - 1 : stopIdx;
  stops.splice(targetIdx, 0, moved);
  // Rebuild visited for this day
  const vis = visited[dayIdx];
  const visitedArr = [...vis];
  const newVis = new Set();
  // map old indices to new
  visitedArr.forEach(oldIdx => {
    let newIdx = oldIdx;
    if (oldIdx === srcStop) {
      newIdx = targetIdx;
    } else if (srcStop < stopIdx) {
      if (oldIdx > srcStop && oldIdx <= targetIdx) newIdx = oldIdx - 1;
    } else {
      if (oldIdx >= targetIdx && oldIdx < srcStop) newIdx = oldIdx + 1;
    }
    newVis.add(newIdx);
  });
  visited[dayIdx] = newVis;
  dragSrc = null;
  saveState();
  renderOutlets();
  showMToast('Parada reordenada ✓');
}

// ─── PARQUES ───────────────────────────────────────────────
const PARQUES_KEY = 'parkTracker_v2';
let parquesState = {};

function parquesLoad() {
  if (window._parquesFromFb) { parquesState = window._parquesFromFb; return; }
  try {
    const d = localStorage.getItem(PARQUES_KEY);
    if (d) parquesState = JSON.parse(d);
  } catch(e) {}
}

function parquesSave() {
  try { localStorage.setItem(PARQUES_KEY, JSON.stringify(parquesState)); } catch(e) {}
  window._fb && window._fb.fbSet('parques', { state: parquesState });
}

function pkKey(parkId, zoneIdx, attrIdx) { return `${parkId}_${zoneIdx}_${attrIdx}`; }
function pkDone(parkId, zoneIdx, attrIdx) { return !!parquesState[pkKey(parkId, zoneIdx, attrIdx)]; }

function toggleAttraction(parkId, zoneIdx, attrIdx) {
  const k = pkKey(parkId, zoneIdx, attrIdx);
  parquesState[k] = !parquesState[k];
  parquesSave();
  // Actualizar pin en mapa sin re-renderizar todo
  const mapInst = _parkMaps[parkId];
  if (mapInst) {
    const park = PARKS_DATA.find(p => p.id === parkId);
    const attr = park?.zones[zoneIdx]?.attractions[attrIdx];
    const globalIdx = park ? (() => { let idx=0; for(let zi=0;zi<zoneIdx;zi++) idx+=park.zones[zi].attractions.length; return idx+attrIdx; })() : -1;
    const markerObj = mapInst._markers && mapInst._markers[globalIdx];
    if (markerObj && attr) {
      const isDone = !!parquesState[k];
      const color = PARK_COLORS[parkId] || '#a78bfa';
      markerObj.setIcon(makeParkPin(color, isDone, attr.name));
    }
  }
  renderParques();
}

function pkCountPark(park) {
  let done = 0, total = 0;
  park.zones.forEach((z, zi) => z.attractions.forEach((_, ai) => { total++; if (pkDone(park.id, zi, ai)) done++; }));
  return { done, total };
}

function pkCountAll() {
  let done = 0, total = 0;
  PARKS_DATA.forEach(p => { const c = pkCountPark(p); done += c.done; total += c.total; });
  return { done, total };
}

function updateParquesCounter() {
  const { done, total } = pkCountAll();
  document.getElementById('global-counter').textContent = done + ' / ' + total;
}

function pkToggleCard(id) {
  const wasOpen = pkOpenCards.has(id);
  if (wasOpen) {
    pkOpenCards.delete(id);
    // Destruir mapa al colapsar para evitar grises
    if (_parkMaps[id]) {
      _parkMaps[id].remove();
      delete _parkMaps[id];
    }
  } else {
    pkOpenCards.add(id);
  }
  renderParques();
  // Si se abre, inicializar mapa después del render
  if (!wasOpen) {
    setTimeout(() => initParkMap(id), 80);
  }
}

function pkSetFilter(id) {
  pkFilter = id;
  renderParques();
}

async function pkResetAll() {
  const ok = await showConfirm('Se va a borrar todo el progreso de atracciones. ¿Confirmás?', '¿Reiniciar Parques?', 'Reiniciar', true);
  if (!ok) return;
  parquesState = {};
  parquesSave();
  renderParques();
  updateParquesCounter();
}

      font-family:'Syne',sans-serif;font-weight:800;font-size:13px;
      border:2px solid ${border};
      box-shadow:0 2px 8px rgba(0,0,0,0.5);
      opacity:${isDone ? '0.7' : '1'};
      transition:all .2s;
    ">${check}</div>`,
    iconSize: [26, 26],
    iconAnchor: [13, 13],
    popupAnchor: [0, -16]
  });
}

function pkToggleParkMap(parkId) {
  const container = document.getElementById(`pkmap-container-${parkId}`);
  const chev = document.getElementById(`pkmap-chev-${parkId}`);
  const wrap = document.getElementById(`pkmap-wrap-${parkId}`);
  if (!container) return;

  const isOpen = container.style.display !== 'none';
  if (isOpen) {
    container.style.display = 'none';
    if (chev) chev.style.transform = '';
    if (wrap) wrap.classList.remove('open');
    if (_parkMaps[parkId]) {
      _parkMaps[parkId].remove();
      delete _parkMaps[parkId];
    }
  } else {
    container.style.display = 'block';
    if (chev) chev.style.transform = 'rotate(180deg)';
    if (wrap) wrap.classList.add('open');
    setTimeout(() => initParkMap(parkId), 80);
  }
}

function initParkMap(parkId) {
  const container = document.getElementById(`pkmap-container-${parkId}`);
  if (!container || container.style.display === 'none') return;

  // Destruir instancia previa si existe
  if (_parkMaps[parkId]) {
    _parkMaps[parkId].remove();
    delete _parkMaps[parkId];
  }
  container.innerHTML = '';

  const park = PARKS_DATA.find(p => p.id === parkId);
  if (!park) return;

  const color = PARK_COLORS[parkId] || '#a78bfa';
  const map = L.map(container, { zoomControl: true, attributionControl: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 19,
    attribution: '© OpenStreetMap'
  }).addTo(map);

  const bounds = [];
  const markers = [];
  let globalIdx = 0;

  park.zones.forEach((zone, zi) => {
    zone.attractions.forEach((attr, ai) => {
      if (!attr.lat || !attr.lng) { globalIdx++; return; }
      const isDone = pkDone(parkId, zi, ai);
      const icon = makeParkPin(color, isDone, attr.name);

      const heightHtml = attr.height
        ? `<div style="font-size:10px;color:#a78bfa;font-weight:600;margin-top:2px">↑ ${attr.height}</div>`
        : '';
      const doneHtml = isDone
        ? `<div style="margin-top:5px;font-size:11px;color:#4ecb8d">✓ Completada</div>`
        : '';

      const marker = L.marker([attr.lat, attr.lng], { icon })
        .bindPopup(`
          <div class="map-popup-name">${attr.name}</div>
          <div class="map-popup-desc">${zone.name}</div>
          ${heightHtml}
          ${doneHtml}
        `, { maxWidth: 200 })
        .addTo(map);

      markers[globalIdx] = marker;
      bounds.push([attr.lat, attr.lng]);
      globalIdx++;
    });
  });

  if (bounds.length > 0) {
    map.fitBounds(bounds, { padding: [28, 28] });
  }

  map._markers = markers;
  _parkMaps[parkId] = map;
  setTimeout(() => map && map.invalidateSize(), 150);
}

// Inicializar mapas de parques que están abiertos al renderizar
function initOpenParkMaps() {
  pkOpenCards.forEach(parkId => {
    setTimeout(() => initParkMap(parkId), 120);
  });
}

function renderParques() {
  const panel = document.getElementById('panel-parques');
  const { done: gDone, total: gTotal } = pkCountAll();
  const gPct = gTotal > 0 ? Math.round(gDone / gTotal * 100) : 0;

  let html = `<div class="parques-panel">
    <div class="parques-global-bar">
      <div class="parques-global-nums">
        <div class="parques-global-count">${gDone}</div>
        <div class="parques-global-lbl">de ${gTotal}</div>
      </div>
      <div class="parques-global-right">
        <div class="parques-global-title">Atracciones completadas</div>
        <div class="parques-prog-bg"><div class="parques-prog-fill" style="width:${gPct}%"></div></div>
      </div>
    </div>
    <div class="parques-filter-bar">`;

  pkFilterMeta.forEach(f => {
    html += `<button class="parques-filter-btn${pkFilter===f.id?' active':''}" onclick="pkSetFilter('${f.id}')">${f.label}</button>`;
  });
  html += `</div>`;

  PARKS_DATA.forEach(park => {
    const visible = pkFilter === 'all' || pkFilter === park.id;
    const { done, total } = pkCountPark(park);
    const pct = total > 0 ? Math.round(done / total * 100) : 0;
    const isOpen = pkOpenCards.has(park.id);

    html += `<div class="park-card ${park.cls}${!visible ? ' pk-hidden' : ''}${isOpen ? ' open' : ''}" id="pkcard-${park.id}">
      <div class="park-card-header" onclick="pkToggleCard('${park.id}')">
        <span class="park-card-emoji">${park.emoji}</span>
        <div class="park-card-info">
          <div class="park-card-name">${park.name}</div>
          <div class="park-card-label">${park.label}</div>
        </div>
        <div class="park-card-right">
          <span class="park-card-count">${done}/${total}</span>
          <div class="park-mini-bar-bg"><div class="park-mini-bar-fill" style="width:${pct}%"></div></div>
          <span class="park-card-chevron">▾</span>
        </div>
      </div>
      <div class="park-card-body">`;

    park.zones.forEach((zone, zi) => {
      html += `<div class="park-zone-title">${zone.name}</div>`;
      zone.attractions.forEach((attr, ai) => {
        const done = pkDone(park.id, zi, ai);
        html += `<div class="park-attr-item${done ? ' pk-done' : ''}" onclick="toggleAttraction('${park.id}',${zi},${ai})">
          <div class="park-attr-check">${done ? '✓' : ''}</div>
          <div class="park-attr-body">
            <div class="park-attr-name">${attr.name}</div>
            ${attr.height ? `<div class="park-attr-height">↑ ${attr.height}</div>` : ''}
          </div>
        </div>`;
      });
    });

    // Mapa colapsable por parque
    const parkAttrsWithCoords = park.zones.flatMap(z => z.attractions).filter(a => a.lat && a.lng);
    if (parkAttrsWithCoords.length > 0) {
      html += `
        <div class="day-map-wrap" id="pkmap-wrap-${park.id}" style="margin:0;border-radius:0 0 var(--radius) var(--radius);border-top:1px solid var(--border);border-left:none;border-right:none;border-bottom:none;">
          <div class="day-map-header" onclick="pkToggleParkMap('${park.id}')">
            <div class="day-map-title">🗺️ Mapa · ${parkAttrsWithCoords.length} atracciones</div>
            <span class="day-map-chevron" id="pkmap-chev-${park.id}">▾</span>
          </div>
          <div id="pkmap-container-${park.id}" class="day-map-container" style="display:none;height:280px;"></div>
        </div>`;
    }

    html += `</div></div>`;
  });

  html += `<div class="parques-reset-row"><button class="wm-reset-btn" onclick="pkResetAll()">↺ Reiniciar todo</button></div>`;
  html += `</div>`;
  panel.innerHTML = html;
  updateParquesCounter();
  // Inicializar mapas para cards ya abiertas
  setTimeout(() => {
    pkOpenCards.forEach(parkId => {
      // Solo si el container existe y está visible (card open)
      const container = document.getElementById(`pkmap-container-${parkId}`);
      if (container && container.style.display !== 'none' && !_parkMaps[parkId]) {
        initParkMap(parkId);
      }
    });
  }, 80);
}

</script>
